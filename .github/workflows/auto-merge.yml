# ============================================================
# WORKFLOW 4: AUTO-MERGE AGENT
# ============================================================
# TRIGGER: All CI checks pass on a PR
# ACTION: Evaluates if PR is safe to auto-merge
# ============================================================

name: "🔀 Auto-Merge Safe PRs"

on:
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    if: github.event.check_suite.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find associated Pull Requests
        id: find-prs
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.check_suite.head_branch}`,
            });
            if (pulls.data.length > 0) {
              core.setOutput('pr_number', pulls.data[0].number);
              core.setOutput('found', 'true');
            } else {
              core.setOutput('found', 'false');
            }

      - name: Run Auto-Merge Agent
        if: steps.find-prs.outputs.found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find-prs.outputs.pr_number }}
        run: python scripts/auto_merge.py
