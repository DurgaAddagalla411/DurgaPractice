# ============================================================
# WORKFLOW 3: PR DESCRIPTION GENERATOR
# ============================================================
# TRIGGER: PR opened
# ACTION: AI generates a rich description from the diff
# ============================================================

name: "📝 Auto PR Description"

on:
  pull_request:
    types: [opened]

jobs:
  generate-description:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PR Description Generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant  # smaller model, uses fewer tokens
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python scripts/pr_description_generator.py
