# ============================================================
# WORKFLOW 5: STALE PR CLEANUP (Scheduled)
# ============================================================
# TRIGGER: Daily at 9am UTC + manual dispatch
# ACTION: Warns and closes abandoned PRs
# ============================================================

name: "🧹 Stale PR Cleanup"

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stale PR Cleanup Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/stale_pr_cleanup.py
