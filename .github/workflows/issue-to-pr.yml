# ============================================================
# WORKFLOW 1: ISSUE → PR AGENT
# ============================================================
# TRIGGER: Issue labeled with "ai-fix"
# ACTION: Runs the Python agent that reads the issue,
#         generates a fix with AI, and opens a PR.
# ============================================================

name: "🤖 Issue → PR Agent"

on:
  issues:
    types: [labeled]

jobs:
  create-pr-from-issue:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Issue-to-PR Agent
        env:
          # Use PAT (if provided) so the PR is attributed to a user and
          # other workflows (pr-review, pr-description) will trigger on it.
          # Fall back to GITHUB_TOKEN if no PAT secret is configured.
          GITHUB_TOKEN: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python scripts/issue_to_pr.py
