# ============================================================
# WORKFLOW 2: AI PR REVIEW AGENT (with Agentic Memory)
# ============================================================
# TRIGGER: PR opened or updated (new commits pushed)
# ACTION: AI reviews PR using memory of past reviews (semantic)
#
# KEY FEATURE: After each run, the memory/ folder is committed
# back to main so the next run starts with the updated memory.
# This makes the agent's memory persistent across runs.
# ============================================================

name: "🔍 AI PR Review"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write    # Needed to commit memory/ back to main
      issues: write

    steps:
      - name: Checkout repository (main branch for memory)
        uses: actions/checkout@v4
        with:
          ref: main       # Pull latest memory from main
          fetch-depth: 0  # Needed to push back later

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip + model downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI PR Review Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant  # smaller model, uses fewer tokens
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python scripts/pr_reviewer.py

      - name: Commit updated memory back to main
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory/ || true
          # Only commit if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "chore(memory): update after PR #${{ github.event.pull_request.number }} review"
            git push origin main
          else
            echo "No memory changes to commit."
          fi
